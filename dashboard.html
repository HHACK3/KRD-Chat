<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurdish Chat — داشبۆرد</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Mobile toggle -->
<button class="btn-icon mobile-toggle" onclick="openMobileMenu()" style="width:40px;height:40px;">
  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
</button>

<!-- Sidebar overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeMobileMenu()"></div>

<div class="app-layout">

  <!-- ── SIDEBAR ── -->
  <div id="sidebar" class="sidebar">

    <!-- Header -->
    <div class="sidebar-header">
      <div class="current-user-avatar">
        <img id="sidebarUserAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="">
        <div class="avatar-status ping"></div>
      </div>
      <div class="current-user-info">
        <strong id="sidebarUserName">بەکارهێنەر</strong>
        <span id="sidebarUserStatus">ئامادە</span>
      </div>
      <div class="sidebar-actions">
        <button class="btn-icon" onclick="goToProfile()" title="پڕۆفایل">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </button>
        <button class="btn-icon" onclick="logout()" title="دەرچوون">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="گەڕان..." id="quickSearch" oninput="handleQuickSearch(this.value)">
      </div>
    </div>

    <!-- Tabs -->
    <div class="sidebar-tabs">
      <button id="tab_friends" class="stab active" onclick="showTab('friends')">هاوڕێکان</button>
      <button id="tab_groups"  class="stab" onclick="showTab('groups')">گروپ</button>
      <button id="tab_notifs"  class="stab" onclick="showTab('notifs')">
        <span id="notifBadge" class="stab-badge" style="display:none;">0</span>
        داواکاری
      </button>
      <button id="tab_blocked" class="stab" onclick="showTab('blocked')">بلۆک</button>
    </div>

    <!-- Friend List -->
    <div id="panel_friends" class="chat-list">
      <div id="friendsList"></div>
    </div>

    <!-- Groups Panel -->
    <div id="panel_groups" class="hidden" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div style="padding:8px;">
        <button class="btn btn-secondary" onclick="openCreateGroup()" style="width:100%;font-size:0.8rem;padding:9px;">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          دروستکردنی گروپی نوێ
        </button>
      </div>
      <div id="groupsList" class="chat-list"></div>
    </div>

    <!-- Notifs Panel -->
    <div id="panel_notifs" class="hidden chat-list">
      <div id="notifList"></div>
    </div>

    <!-- Blocked Panel -->
    <div id="panel_blocked" class="hidden chat-list">
      <div id="blockedList"></div>
    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button class="btn btn-secondary" onclick="searchUsers()" style="width:100%;font-size:0.8rem;padding:9px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
        گەڕانی بەکارهێنەران
      </button>
    </div>
  </div>

  <!-- ── MAIN CHAT ── -->
  <div class="chat-main">

    <!-- Chat Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <img id="chatHeaderAvatar" class="chat-header-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=chat" alt="">
        <div>
          <div id="chatHeaderName" class="chat-header-name">Kurdish Chat</div>
          <div id="chatHeaderStatus" class="chat-header-status">هەڵبژاردنی چات بکە</div>
        </div>
      </div>
      <div class="chat-header-right">
        <button class="btn-icon" onclick="searchUsers()" title="گەڕان">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div id="messagesArea" class="messages-area">
      <div id="chatWelcome" class="chat-welcome">
        <div class="welcome-icon">
          <svg width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <h2>بەخێربێیت بۆ Kurdish Chat</h2>
        <p>هاوڕێیەک هەڵبژێرە یان گروپێک بکە بۆ دەستپێکردنی گفتووگۆ</p>
      </div>
    </div>

    <!-- Input -->
    <div id="chatInputBar" class="chat-input-bar hidden">
      <button class="btn-icon" title="فایل">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
      </button>
      <textarea id="msgInput" class="chat-input" placeholder="نامە بنووسە..." rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ── MODALS ── -->

<!-- Search Modal -->
<div id="searchModal" class="modal-back hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">گەڕانی بەکارهێنەر / گروپ</span>
      <button class="btn-icon" onclick="closeSearch()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px;">
      <button class="btn btn-primary" style="flex:1;padding:8px;font-size:0.8rem;" onclick="setSearchType('users')">بەکارهێنەر</button>
      <button class="btn btn-secondary" style="flex:1;padding:8px;font-size:0.8rem;" onclick="setSearchType('groups')">گروپ</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:12px;">
      <input type="text" id="userSearchInput" class="form-input" placeholder="ناوی بەکارهێنەر..." style="flex:1;" onkeydown="if(event.key==='Enter')performSearch()">
      <button class="btn btn-primary" style="width:auto;padding:10px 16px;" onclick="performSearch()">گەڕان</button>
    </div>
    <div id="searchResults" style="max-height:280px;overflow-y:auto;"></div>
  </div>
</div>

<!-- Create Group Modal -->
<div id="createGroupModal" class="modal-back hidden">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">دروستکردنی گروپی نوێ</span>
      <button class="btn-icon" onclick="closeCreateGroup()"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="form-group">
      <label class="form-label">ناوی گروپ</label>
      <input type="text" id="newGroupName" class="form-input" placeholder="ناوی گروپ بنووسە">
    </div>
    <div class="form-group" style="margin-top:10px;">
      <label class="form-label">وەسف (ئارەزوومەندانە)</label>
      <textarea id="newGroupDesc" class="form-input" rows="3" placeholder="وەسفی گروپ..."></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:18px;">
      <button class="btn btn-primary" onclick="createGroup()">دروستکردن</button>
      <button class="btn btn-secondary" onclick="closeCreateGroup()">داخستن</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden"><span id="toastMessage"></span></div>

<script src="firebase-config.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script src="chat.js"></script>
<script>
function handleQuickSearch(q) {
  const items = document.querySelectorAll('.cl-item');
  items.forEach(item => {
    const name = item.querySelector('.cl-name')?.textContent.toLowerCase() || '';
    item.style.display = name.includes(q.toLowerCase()) ? '' : 'none';
  });
}
</script>
</body>
</html>
