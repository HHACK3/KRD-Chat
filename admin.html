<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurdish Chat — بەڕێوەبەر</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Login Screen -->
<div id="adminLoginPage" class="auth-page">
  <div class="auth-wrap">
    <div class="auth-brand">
      <div class="auth-brand-logo">
        <div class="brand-icon" style="background:linear-gradient(135deg,#E8A020,#D94040);">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <h1>بەڕێوەبەر</h1>
      </div>
      <p>پانێڵی کۆنترۆڵی Kurdish Chat</p>
    </div>
    <div class="flag-strip"></div>
    <div class="auth-card">
      <div class="form-group"><label class="form-label">ئیمەیل</label><input type="email" id="adminEmail" class="form-input" placeholder="admin@example.com"></div>
      <div class="form-group" style="margin-top:12px;"><label class="form-label">تێپەڕەوشە</label><input type="password" id="adminPassword" class="form-input" onkeydown="if(event.key==='Enter')adminLogin()"></div>
      <button class="btn btn-primary" onclick="adminLogin()" style="margin-top:14px;" id="adminLoginBtn">چوونەژوورەوەی بەڕێوەبەر</button>
      <div style="text-align:center;margin-top:14px;"><a href="dashboard.html" style="font-size:0.78rem;color:var(--t3);">← گەڕانەوە بۆ داشبۆرد</a></div>
    </div>
  </div>
</div>

<!-- Admin Dashboard -->
<div id="adminDashPage" class="hidden" style="min-height:100vh;display:flex;flex-direction:column;">
  <div class="admin-layout" style="flex:1;">

    <!-- Sidebar Nav -->
    <div class="admin-nav">
      <div class="admin-nav-brand">
        <div class="admin-nav-brand-txt">Kurdish Chat</div>
        <div class="admin-nav-brand-sub">پانێڵی بەڕێوەبەر</div>
      </div>
      <div class="admin-nav-section">سەرەکی</div>
      <button class="admin-nav-item active" id="navOverview" onclick="switchSection('overview')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        گشتی
      </button>
      <button class="admin-nav-item" id="navUsers" onclick="switchSection('users')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        بەکارهێنەران
      </button>
      <button class="admin-nav-item" id="navGroups" onclick="switchSection('groups')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
        گروپەکان
      </button>
      <div class="admin-nav-section" style="margin-top:8px;">سیستەم</div>
      <button class="admin-nav-item" onclick="window.location.href='dashboard.html'">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        داشبۆرد
      </button>
      <button class="admin-nav-item" onclick="logout()">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7"/></svg>
        دەرچوون
      </button>
    </div>

    <!-- Main -->
    <div class="admin-main">
      <div class="admin-topbar">
        <span class="admin-topbar-title" id="sectionTitle">گشتی</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:0.75rem;color:var(--t3);" id="adminUserName"></span>
          <div style="width:30px;height:30px;border-radius:50%;background:rgba(230,57,70,0.2);border:1px solid rgba(230,57,70,0.3);display:flex;align-items:center;justify-content:center;color:var(--red);font-size:0.7rem;font-weight:800;">A</div>
        </div>
      </div>

      <div class="admin-content" id="adminContent">
        <!-- Overview -->
        <div id="sectionOverview">
          <div class="stats-grid" id="statsGrid"></div>
          <div class="section-card">
            <div class="section-head"><span class="section-title">دوایین بەکارهێنەران</span></div>
            <div style="overflow-x:auto;"><table class="data-table" id="recentUsersTable"><thead><tr><th>بەکارهێنەر</th><th>ئیمەیل</th><th>دۆخ</th><th>کاتی تۆمارکردن</th></tr></thead><tbody id="recentUsersBody"></tbody></table></div>
          </div>
        </div>

        <!-- Users -->
        <div id="sectionUsers" class="hidden">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div class="search-box" style="max-width:280px;flex:1;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
              <input type="text" class="search-input" placeholder="گەڕانی بەکارهێنەر..." oninput="filterUsersTable(this.value)">
            </div>
          </div>
          <div class="section-card">
            <div class="section-head"><span class="section-title" id="usersCountTitle">بەکارهێنەران</span></div>
            <div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>بەکارهێنەر</th><th>ئیمەیل</th><th>ناوی بەکارهێنەر</th><th>ڕۆڵ</th><th>دۆخ</th><th>کردارەکان</th></tr></thead><tbody id="allUsersBody"></tbody></table></div>
          </div>
        </div>

        <!-- Groups -->
        <div id="sectionGroups" class="hidden">
          <div class="section-card">
            <div class="section-head"><span class="section-title" id="groupsCountTitle">گروپەکان</span></div>
            <div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>گروپ</th><th>ئەندامان</th><th>دروستکەر</th><th>کاتی دروستکردن</th><th>کردارەکان</th></tr></thead><tbody id="groupsBody"></tbody></table></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="hidden"><span id="toastMessage"></span></div>

<script src="firebase-config.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script>
let adminUser = null;
let allUsersCache = [];

async function adminLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const pass  = document.getElementById('adminPassword').value;
  if (!email || !pass) return showToast('هەموو بەشەکان پڕ بکە', 'warning');
  const btn = document.getElementById('adminLoginBtn');
  btn.disabled = true; btn.textContent = '...';
  try {
    await firebase.auth().signInWithEmailAndPassword(email, pass);
    const u = firebase.auth().currentUser;
    const doc = await db.collection('users').doc(u.uid).get();
    if (doc.data()?.role !== 'admin') { await auth.signOut(); showToast('تۆ بەڕێوەبەر نیت', 'error'); return; }
    adminUser = u;
    document.getElementById('adminLoginPage').classList.add('hidden');
    document.getElementById('adminDashPage').classList.remove('hidden');
    document.getElementById('adminDashPage').style.display = 'flex';
    document.getElementById('adminUserName').textContent = doc.data().firstName || '';
    loadAdminData();
    window.history.replaceState({}, '', window.location.pathname);
  } catch (e) {
    showToast(e.code === 'auth/wrong-password' ? 'تێپەڕەوشە هەڵەیە' : 'چوونەژوورەوە سەرکەوتوو نەبوو', 'error');
  } finally { btn.disabled = false; btn.textContent = 'چوونەژوورەوەی بەڕێوەبەر'; }
}

async function loadAdminData() {
  // Stats
  const [users, groups, msgs, online] = await Promise.all([
    db.collection('users').get(),
    db.collection('publicGroups').get(),
    db.collection('privateMessages').get(),
    db.collection('users').where('isOnline','==',true).get()
  ]);
  const stats = [
    { icon:'r', label:'بەکارهێنەران', value: users.size },
    { icon:'g', label:'ئۆنلاین', value: online.size },
    { icon:'b', label:'گروپەکان', value: groups.size },
    { icon:'y', label:'نامەکان', value: msgs.size }
  ];
  const icons = { r:'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z', g:'M5.636 18.364a9 9 0 010-12.728m12.728 0a9 9 0 010 12.728M3 12h1m17 0h1M12 3v1m0 17v1', b:'M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z', y:'M13 10V3L4 14h7v7l9-11h-7z' };
  document.getElementById('statsGrid').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="sc-icon sc-icon-${s.icon}"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="${icons[s.icon]}"/></svg></div>
      <div class="sc-num">${s.value}</div><div class="sc-lbl">${s.label}</div>
    </div>`).join('');

  // Recent users
  allUsersCache = users.docs.map(d => ({ id:d.id, ...d.data() }));
  const tbody = document.getElementById('recentUsersBody');
  tbody.innerHTML = allUsersCache.slice(0,8).map(u => `
    <tr><td><div style="display:flex;align-items:center;gap:8px;">
      <img src="${u.profilePhoto || `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.uid}`}" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--b1);">
      <span style="font-weight:600;color:var(--t1);">${u.firstName || '—'}</span></div></td>
    <td>${u.email || '—'}</td>
    <td>${u.isOnline ? '<span class="pill pill-green">ئۆنلاین</span>' : '<span class="pill pill-gray">ئۆفلاین</span>'}</td>
    <td style="font-size:0.75rem;">${u.createdAt ? utils.formatDate(u.createdAt,'short') : '—'}</td></tr>`).join('');

  // All users table
  renderAllUsers(allUsersCache);

  // Groups
  const gbody = document.getElementById('groupsBody');
  document.getElementById('groupsCountTitle').textContent = `گروپەکان (${groups.size})`;
  gbody.innerHTML = groups.docs.map(d => {
    const g = d.data();
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px;">
        <img src="${g.avatar || `https://api.dicebear.com/7.x/identicon/svg?seed=${d.id}`}" style="width:28px;height:28px;border-radius:8px;border:1px solid var(--b1);">
        <span style="font-weight:600;color:var(--t1);">${g.name || '—'}</span></div></td>
      <td>${g.members?.length || 0}</td>
      <td style="font-size:0.78rem;">${g.creatorUid?.slice(0,10) || '—'}...</td>
      <td style="font-size:0.75rem;">${g.createdAt ? utils.formatDate(g.createdAt,'short') : '—'}</td>
      <td><button style="padding:4px 10px;background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.3);color:#FF6B6B;border-radius:6px;font-size:0.72rem;font-weight:700;cursor:pointer;" onclick="deleteGroup('${d.id}')">سڕینەوە</button></td>
    </tr>`;
  }).join('');
}

function renderAllUsers(users) {
  document.getElementById('usersCountTitle').textContent = `بەکارهێنەران (${users.length})`;
  document.getElementById('allUsersBody').innerHTML = users.map(u => `
    <tr>
      <td><div style="display:flex;align-items:center;gap:8px;">
        <img src="${u.profilePhoto || `https://api.dicebear.com/7.x/avataaars/svg?seed=${u.uid}`}" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--b1);">
        <span style="font-weight:600;color:var(--t1);">${u.firstName || '—'}</span></div></td>
      <td style="font-size:0.78rem;">${u.email || '—'}</td>
      <td style="font-size:0.78rem;">@${u.username || '—'}</td>
      <td>${u.role === 'admin' ? '<span class="pill pill-gold">بەڕێوەبەر</span>' : '<span class="pill pill-gray">بەکارهێنەر</span>'}</td>
      <td>${u.isOnline ? '<span class="pill pill-green">ئۆنلاین</span>' : '<span class="pill pill-gray">ئۆفلاین</span>'}</td>
      <td style="display:flex;gap:5px;">
        <button style="padding:4px 9px;background:rgba(232,160,32,0.15);border:1px solid rgba(232,160,32,0.3);color:#FCD34D;border-radius:6px;font-size:0.7rem;font-weight:700;cursor:pointer;" onclick="toggleAdmin('${u.uid}','${u.role}')">
          ${u.role === 'admin' ? 'ڕۆڵ لابردن' : 'بەڕێوەبەر بکە'}
        </button>
        <button style="padding:4px 9px;background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.3);color:#FF6B6B;border-radius:6px;font-size:0.7rem;font-weight:700;cursor:pointer;" onclick="deleteUser('${u.uid}')">سڕینەوە</button>
      </td>
    </tr>`).join('');
}

function filterUsersTable(q) {
  const f = allUsersCache.filter(u => (u.firstName||'').toLowerCase().includes(q.toLowerCase()) || (u.email||'').toLowerCase().includes(q.toLowerCase()) || (u.username||'').toLowerCase().includes(q.toLowerCase()));
  renderAllUsers(f);
}

async function toggleAdmin(uid, currentRole) {
  const newRole = currentRole === 'admin' ? 'user' : 'admin';
  await db.collection('users').doc(uid).update({ role: newRole });
  showToast(newRole === 'admin' ? 'بەڕێوەبەر کرا' : 'ڕۆڵ لابرا', 'success');
  loadAdminData();
}

async function deleteUser(uid) {
  if (!confirm('دڵنیایت لە سڕینەوەی ئەم بەکارهێنەرە؟')) return;
  await db.collection('users').doc(uid).delete();
  showToast('بەکارهێنەر سڕایەوە', 'success');
  loadAdminData();
}

async function deleteGroup(id) {
  if (!confirm('دڵنیایت لە سڕینەوەی ئەم گروپە؟')) return;
  await db.collection('publicGroups').doc(id).delete();
  showToast('گروپ سڕایەوە', 'success');
  loadAdminData();
}

function switchSection(s) {
  ['overview','users','groups'].forEach(x => {
    document.getElementById('section' + x.charAt(0).toUpperCase() + x.slice(1)).classList.add('hidden');
    document.getElementById('nav' + x.charAt(0).toUpperCase() + x.slice(1))?.classList.remove('active');
  });
  document.getElementById('section' + s.charAt(0).toUpperCase() + s.slice(1)).classList.remove('hidden');
  document.getElementById('nav' + s.charAt(0).toUpperCase() + s.slice(1))?.classList.add('active');
  const titles = { overview:'گشتی', users:'بەکارهێنەران', groups:'گروپەکان' };
  document.getElementById('sectionTitle').textContent = titles[s];
}

function logout() { authFns.logout(); }
</script>
</body>
</html>
