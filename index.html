<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kurdish Chat — چاتی کوردی</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-wrap">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-brand-logo">
        <div class="brand-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </div>
        <h1>Kurdish Chat</h1>
      </div>
      <p>پلاتفۆرمی گفتووگۆی کوردی</p>
    </div>

    <div class="flag-strip"></div>

    <!-- Card -->
    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tab-row">
        <button class="auth-tab active" onclick="showLogin()">چوونەژوورەوە</button>
        <button class="auth-tab" onclick="showSignup()">تۆمارکردن</button>
      </div>

      <!-- Login Pane -->
      <div id="loginPane">
        <div class="form-group">
          <label class="form-label">ئیمەیل</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="name@example.com" onkeydown="if(event.key==='Enter')login()">
        </div>
        <div class="form-group">
          <label class="form-label">تێپەڕەوشە</label>
          <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
        </div>
        <button id="loginBtn" class="btn btn-primary" onclick="login()" style="margin-top:6px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14"/></svg>
          چوونەژوورەوە
        </button>

        <div class="divider">یان</div>

        <button class="google-btn" onclick="signInWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          چوونەژوورەوە بە گوگڵ
        </button>
      </div>

      <!-- Signup Pane -->
      <div id="signupPane" class="hidden">
        <div class="form-group">
          <label class="form-label">ناوی تەواو</label>
          <input type="text" id="signupName" class="form-input" placeholder="ناوی تەواوت بنووسە">
        </div>
        <div class="form-group">
          <label class="form-label">ناوی بەکارهێنەر</label>
          <input type="text" id="signupUsername" class="form-input" placeholder="username_123">
        </div>
        <div class="form-group">
          <label class="form-label">ئیمەیل</label>
          <input type="email" id="signupEmail" class="form-input" placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">تێپەڕەوشە</label>
          <input type="password" id="signupPassword" class="form-input" placeholder="لاکەم ٦ پیت">
        </div>
        <div class="form-group">
          <label class="form-label">دووبارە تێپەڕەوشە</label>
          <input type="password" id="signupConfirm" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')signup()">
        </div>
        <button id="signupBtn" class="btn btn-primary" onclick="signup()" style="margin-top:6px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
          تۆمارکردن
        </button>
      </div>
    </div>

    <p style="text-align:center;font-size:0.72rem;color:var(--t3);margin-top:20px;">
      کوردستان — پلاتفۆرمی خۆت
    </p>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden"><span id="toastMessage"></span></div>

<script src="firebase-config.js"></script>
<script src="utils.js"></script>
<script src="auth.js"></script>
<script>
  // Check if already logged in
  auth.onAuthStateChanged(u => {
    if (u) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
